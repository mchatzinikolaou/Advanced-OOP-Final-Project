# Application Configuration
spring.application.name=logistics-system
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:logisticsdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration
logging.level.com.logistics=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Thread Pool Configuration
logistics.async.core-pool-size=5
logistics.async.max-pool-size=10
logistics.async.queue-capacity=100
logistics.async.thread-name-prefix=Async-Thread-
logistics.async.await-termination-seconds=60

# Order Processing Configuration
logistics.order.processing-delay-ms=3000

# Vehicle Fleet Configuration
logistics.fleet.truck-count=3
logistics.fleet.van-count=5
logistics.fleet.drone-count=10

# Vehicle Specifications - Truck
logistics.vehicle.truck.capacity-kg=10000.0
logistics.vehicle.truck.speed-kmh=80.0
logistics.vehicle.truck.license-prefix=TRK

# Vehicle Specifications - Van
logistics.vehicle.van.capacity-kg=2000.0
logistics.vehicle.van.speed-kmh=90.0
logistics.vehicle.van.license-prefix=VAN

# Vehicle Specifications - Drone
logistics.vehicle.drone.capacity-kg=5.0
logistics.vehicle.drone.speed-kmh=50.0
logistics.vehicle.drone.license-prefix=DRN

# License Plate Generation
logistics.vehicle.license-separator=-
logistics.vehicle.license-uuid-start=0
logistics.vehicle.license-uuid-end=8

# Shipping Cost Configuration
logistics.shipping.standard.rate-per-kg=2.5
logistics.shipping.express.rate-per-kg=2.5
logistics.shipping.express.surcharge-multiplier=1.5
logistics.shipping.free.cost=0.0

# Simulation Success Rates (0.0 to 1.0)
logistics.simulation.inventory-check-failure-rate=0.1
logistics.simulation.payment-failure-rate=0.05

# Response Messages
logistics.response.order-accepted-message=Order accepted and is being processed
